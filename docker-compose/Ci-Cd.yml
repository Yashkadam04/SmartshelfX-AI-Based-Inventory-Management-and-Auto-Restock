# ═══════════════════════════════════════════════════════════════
#  SmartShelfX — GitHub Actions CI/CD Pipeline
#
#  WHAT THIS DOES:
#  Every time you push to main branch:
#  1. Tests backend code
#  2. Builds Angular frontend
#  3. Builds Docker images for all 3 services
#  4. Pushes images to Docker Hub
#  5. Triggers Render to deploy new images
#  6. Deploys frontend to Vercel
#
#  YOU NEVER NEED TO DEPLOY MANUALLY AGAIN!
# ═══════════════════════════════════════════════════════════════

name: SmartShelfX — Full DevOps Pipeline

# WHEN does this pipeline run?
on:
  push:
    branches: [main]        # runs on every push to main branch
  pull_request:
    branches: [main]        # runs when PR is opened against main

# Environment variables available to all jobs
env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  # IMAGE_TAG = git commit SHA (unique ID for each build)
  # e.g. "abc1234" — so we can track exactly which code is deployed
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ══════════════════════════════════════════════════════════════
  # JOB 1 — TEST BACKEND
  # ══════════════════════════════════════════════════════════════
  # This job checks if backend code has any errors BEFORE deploying
  # Catches bugs early — better to fail here than in production!
  test-backend:
    name: 🧪 Test Backend Code
    runs-on: ubuntu-latest
    # runs-on = what type of server to run this job on
    # ubuntu-latest = free Linux server provided by GitHub

    steps:
      # Step 1: Download our code onto the GitHub Actions server
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        # "uses" = use a pre-built action from GitHub marketplace

      # Step 2: Install Node.js on the server
      - name: 🟢 Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
          # cache = save node_modules between runs (faster!)

      # Step 3: Install dependencies
      - name: 📦 Install backend dependencies
        run: cd backend && npm ci

      # Step 4: Check every JS file for syntax errors
      - name: ✅ Check syntax of all files
        run: |
          cd backend
          echo "Checking server.js..."
          node --check server.js
          echo "Checking routes..."
          for f in routes/*.js; do node --check "$f"; done
          echo "Checking utils..."
          for f in utils/*.js; do node --check "$f"; done
          echo "Checking models..."
          node --check models/index.js
          echo "✅ All files passed syntax check!"

  # ══════════════════════════════════════════════════════════════
  # JOB 2 — BUILD FRONTEND
  # ══════════════════════════════════════════════════════════════
  build-frontend:
    name: 🔨 Build Angular Frontend
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install frontend dependencies
        run: cd frontend && npm ci

      - name: 🔨 Build Angular production bundle
        run: cd frontend && npx ng build --configuration production
        # This compiles TypeScript → JavaScript
        # Bundles and minifies all files
        # Output goes to dist/smartshelfx/browser/

      - name: ✅ Verify build output
        run: |
          echo "Build output:"
          ls -la frontend/dist/smartshelfx/browser/
          echo "✅ Frontend build successful!"

      # Save build output to reuse in later jobs
      - name: 💾 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 1

  # ══════════════════════════════════════════════════════════════
  # JOB 3 — BUILD AND PUSH DOCKER IMAGES
  # Only runs when pushing to main (not on PRs)
  # needs = this job waits for Job 1 and Job 2 to pass first
  # ══════════════════════════════════════════════════════════════
  build-docker-images:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # if = only run when pushing to main, not on pull requests

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Docker Buildx = advanced Docker builder (supports caching)
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to Docker Hub using secrets
      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          # secrets = stored securely in GitHub, never visible in logs

      # ── Build and Push Backend Image ──────────────────────────
      - name: 🐳 Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/smartshelfx-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/smartshelfx-backend:${{ env.IMAGE_TAG }}
          # Two tags:
          # :latest = always points to newest image
          # :abc1234 = specific version (for rollback if needed)
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # cache = reuse unchanged Docker layers (faster builds)

      # ── Build and Push Frontend Image ─────────────────────────
      - name: 🐳 Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/smartshelfx-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/smartshelfx-frontend:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build and Push ML Service Image ───────────────────────
      - name: 🐳 Build & Push ML Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./ml-service
          dockerfile: ./ml-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/smartshelfx-ml:latest
            ${{ secrets.DOCKER_USERNAME }}/smartshelfx-ml:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Images pushed successfully
        run: |
          echo "════════════════════════════════════════"
          echo "  Docker Images Pushed to Docker Hub:"
          echo "  Backend  → ${{ secrets.DOCKER_USERNAME }}/smartshelfx-backend:${{ env.IMAGE_TAG }}"
          echo "  Frontend → ${{ secrets.DOCKER_USERNAME }}/smartshelfx-frontend:${{ env.IMAGE_TAG }}"
          echo "  ML       → ${{ secrets.DOCKER_USERNAME }}/smartshelfx-ml:${{ env.IMAGE_TAG }}"
          echo "════════════════════════════════════════"

  # ══════════════════════════════════════════════════════════════
  # JOB 4 — DEPLOY TO RENDER (Backend + ML)
  # Render supports deploying from Docker Hub images!
  # We trigger Render's deploy webhook — it pulls latest image
  # ══════════════════════════════════════════════════════════════
  deploy-backend:
    name: 🚀 Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: [build-docker-images]

    steps:
      - name: 🚀 Trigger Render deploy — Backend
        run: |
          curl --fail -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"
          echo "✅ Backend deploy triggered on Render!"

      - name: 🚀 Trigger Render deploy — ML Service
        run: |
          curl --fail -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_ML }}"
          echo "✅ ML Service deploy triggered on Render!"

  # ══════════════════════════════════════════════════════════════
  # JOB 5 — DEPLOY FRONTEND TO VERCEL
  # ══════════════════════════════════════════════════════════════
  deploy-frontend:
    name: 🚀 Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: [build-docker-images]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

      - name: 📦 Install Vercel CLI
        run: npm install -g vercel

      - name: 🚀 Deploy to Vercel
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          cd frontend
          vercel --prod --token=$VERCEL_TOKEN
          echo "✅ Frontend deployed to Vercel!"

  # ══════════════════════════════════════════════════════════════
  # JOB 6 — FINAL SUMMARY
  # ══════════════════════════════════════════════════════════════
  summary:
    name: 📋 Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: 🎉 Print final status
        run: |
          echo "════════════════════════════════════════════════"
          echo "  SmartShelfX — Deployment Pipeline Complete!"
          echo "════════════════════════════════════════════════"
          echo ""
          echo "  🌐 Frontend  → https://smartshelfx.vercel.app"
          echo "  ⚙️  Backend   → https://smartshelfx-backend.onrender.com"
          echo "  🤖 ML Svc    → https://smartshelfx-ml.onrender.com"
          echo "  🗄️  Database  → MongoDB Atlas"
          echo ""
          echo "  🐳 Docker Images:"
          echo "  → ${{ secrets.DOCKER_USERNAME }}/smartshelfx-backend:latest"
          echo "  → ${{ secrets.DOCKER_USERNAME }}/smartshelfx-frontend:latest"
          echo "  → ${{ secrets.DOCKER_USERNAME }}/smartshelfx-ml:latest"
          echo "════════════════════════════════════════════════"
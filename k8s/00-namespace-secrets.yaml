# ── Namespace ─────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: smartshelfx
  labels:
    app: smartshelfx

---
# ── Secrets (base64 encoded values) ──────────────────────────────
# Generate with: echo -n "yourvalue" | base64
apiVersion: v1
kind: Secret
metadata:
  name: smartshelfx-secrets
  namespace: smartshelfx
type: Opaque
stringData:
  JWT_SECRET:    "smartshelfx_jwt_secret_change_in_production"
  MONGO_URI:     "mongodb://mongodb-service:27017/smartshelfx"
  SMTP_HOST:     "smtp.gmail.com"
  SMTP_PORT:     "587"
  SMTP_USER:     "your_email@gmail.com"
  SMTP_PASS:     "your_app_password"
  SMTP_FROM:     "SmartShelfX <noreply@smartshelfx.com>"
  APP_URL:       "https://your-domain.railway.app"